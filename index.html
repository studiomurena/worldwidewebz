<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO MURENA - OS</title>
    <style>
        :root { --monitor-color: #d9d9d9; }
        * { box-sizing: border-box; }
        body { 
            background: #1a1a1a; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: "Courier New", monospace;
        }
        #monitor-bezel {
            width: 95vw; max-width: 900px;
            aspect-ratio: 4 / 3;
            background: var(--monitor-color);
            border-radius: 30px; padding: 15px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 30px 60px rgba(0,0,0,0.8);
            border: 10px solid #b0b0b0;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        #screen {
            width: 100%; height: 100%;
            background: #008080; position: relative; overflow: hidden;
            border-radius: 10px; border: 12px solid #111;
            display: flex; flex-direction: column;
        }
        #screen::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 99;
        }
        #center-logo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(18px, 4vw, 35px); font-weight: bold;
            text-align: center; pointer-events: none; opacity: 0.8;
            animation: color-shift 3s infinite, glitch-txt 0.5s infinite;
        }
        @keyframes color-shift { 0% { color: #0f0; } 33% { color: #f0f; } 66% { color: #0ff; } 100% { color: #0f0; } }
        @keyframes glitch-txt { 0% { transform: translate(-50%, -50%) skew(0deg); } 10% { transform: translate(-51%, -49%) skew(2deg); } 20% { transform: translate(-49%, -51%) skew(-2deg); } }

        #desktop { 
            flex-grow: 1; padding: 15px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            grid-auto-rows: min-content;
            gap: 15px; z-index: 2; 
        }
        .icon { width: 80px; text-align: center; cursor: pointer; color: white; text-shadow: 1px 1px #000; text-decoration: none; font-size: 11px; font-weight: bold; }
        .icon span { font-size: 35px; display: block; margin-bottom: 5px; }

        .window { position: absolute; background: #c0c0c0; border: 3px outset #fff; display: none; flex-direction: column; z-index: 10; width: 85%; box-shadow: 5px 5px 0px #000; }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 4px 8px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .window-content { padding: 12px; color: #000; font-size: 13px; overflow-y: auto; max-height: 45vh; }
        
        #taskbar { height: 35px; background: #c0c0c0; border-top: 3px outset #fff; display: flex; align-items: center; padding: 2px 5px; z-index: 100; }
        #glitch-clock { 
            margin-left: auto; padding: 0 10px; font-weight: bold; 
            border-left: 2px inset #fff; background: #bdbdbd; 
            font-size: 11px; height: 100%; display: flex; align-items: center; color: #000;
        }
        button { background: #c0c0c0; border: 2px outset #fff; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 12px; padding: 2px 8px; }
        button:active { border-style: inset; }
    </style>
</head>
<body>
    <div id="monitor-bezel">
        <div id="screen">
            <div id="center-logo">STUDIOMURENA.NET</div>
            <div id="desktop">
                <a href="game.html" class="icon"><span>🎮</span>GAME.EXE</a>
                <div class="icon" onclick="openWin('win-bio')"><span>👤</span>BIO.TXT</div>
                <a href="https://www.nancymerch.it/studio-murena/" target="_blank" class="icon"><span>👕</span>SHOP.URL</a>
                <a href="https://link.dice.fm/k2fa8c1a2c43?dice_id=k2fa8c1a2c43" target="_blank" class="icon"><span>🎟️</span>TICKETS.EXE</a>
                <div class="icon" onclick="openWin('win-spotify')"><span>📻</span>AUDIO.WAV</div>
            </div>

            <div id="win-bio" class="window" style="top:10%; left:5%;">
                <div class="title-bar"><span>Bio.txt</span><button onclick="closeWin('win-bio')">X</button></div>
                <div class="window-content">
                    <b>Studio Murena</b>: Il sestetto milanese che fonde jazzcore e hip-hop. <br><br>
                    Dopo <i>WadiruM</i> (2023), il 9 maggio 2025 pubblicano l'album <i>Notturno</i>.
                </div>
            </div>

            <div id="win-spotify" class="window" style="top:15%; right:5%; width:280px;">
                <div class="title-bar"><span>Spotify_Player</span><button onclick="closeWin('win-spotify')">X</button></div>
                <div class="window-content" style="padding:5px;">
                    <iframe style="border-radius:8px" src="https://open.spotify.com/embed/artist/3B3mNfUv0Yf20i28mGf7S6" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
            </div>

            <div id="taskbar">
                <button>Start</button>
                <div id="glitch-clock">--/--/----</div>
            </div>
        </div>
    </div>
    <script>
        function openWin(id) { 
            const wins = document.querySelectorAll('.window');
            wins.forEach(w => w.style.zIndex = 10);
            const target = document.getElementById(id);
            target.style.display = 'flex'; 
            target.style.zIndex = 20;
        }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }

        // LOGICA GLITCH CLOCK
        const clockEl = document.getElementById('glitch-clock');
        const dates = [
            () => new Date().toLocaleDateString('it-IT'), // Real Time
            "01/01/1983",                                 // Inaugurazione Internet
            "18/06/2026"                                  // Futuro
        ];
        let dateIdx = 0;
        setInterval(() => {
            dateIdx = (dateIdx + 1) % dates.length;
            const currentVal = dates[dateIdx];
            clockEl.innerText = typeof currentVal === 'function' ? currentVal() : currentVal;
        }, 4000); // Cambia ogni 4 secondi
        clockEl.innerText = dates[0]();
    </script>
</body>
</html>
