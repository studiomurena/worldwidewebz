<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO MURENA - OS</title>
    <style>
        :root { --monitor-color: #d9d9d9; }
        * { box-sizing: border-box; }
        body { 
            background: #1a1a1a; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; overflow: hidden;
            font-family: "Courier New", monospace;
        }
        /* MONITOR 4:3 */
        #monitor-bezel {
            width: 95vw; max-width: 900px;
            aspect-ratio: 4 / 3;
            background: var(--monitor-color);
            border-radius: 30px; padding: 20px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 30px 60px rgba(0,0,0,0.8);
            border: 10px solid #b0b0b0;
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        #screen {
            width: 100%; height: 100%;
            background: #008080; position: relative; overflow: hidden;
            border-radius: 10px; border: 15px solid #111;
            display: flex; flex-direction: column;
        }
        #screen::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 99;
        }
        /* LOGO CENTRALE */
        #center-logo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(20px, 5vw, 40px); font-weight: bold;
            text-align: center; pointer-events: none;
            animation: color-shift 2s infinite, glitch-txt 0.5s infinite;
        }
        @keyframes color-shift { 0% { color: #0f0; } 33% { color: #f0f; } 66% { color: #0ff; } 100% { color: #0f0; } }
        @keyframes glitch-txt { 0% { transform: translate(-50%, -50%) skew(0deg); } 10% { transform: translate(-51%, -49%) skew(3deg); } 20% { transform: translate(-49%, -51%) skew(-3deg); } }

        #desktop { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 2; }
        .icon { width: 80px; text-align: center; cursor: pointer; color: white; text-shadow: 1px 1px #000; text-decoration: none; }
        .icon span { font-size: 40px; display: block; }

        .window { position: absolute; background: #c0c0c0; border: 3px outset #fff; display: none; flex-direction: column; z-index: 10; width: 80%; box-shadow: 5px 5px 0px #000; }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 4px 8px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .window-content { padding: 15px; color: #000; font-size: 14px; overflow-y: auto; max-height: 50vh; }
        
        #taskbar { height: 40px; background: #c0c0c0; border-top: 3px outset #fff; display: flex; align-items: center; padding: 5px; z-index: 100; }
        button { background: #c0c0c0; border: 2px outset #fff; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="monitor-bezel">
        <div id="screen">
            <div id="center-logo">STUDIOMURENA.NET</div>
            <div id="desktop">
                <a href="game.html" class="icon"><span>🎮</span>GAME.EXE</a>
                <div class="icon" onclick="openWin('win-bio')"><span>👤</span>BIO.TXT</div>
                <div class="icon" onclick="openWin('win-spotify')"><span>📻</span>AUDIO.WAV</div>
            </div>

            <div id="win-bio" class="window" style="top:10%; left:10%;">
                <div class="title-bar"><span>Bio.txt</span><button onclick="closeWin('win-bio')">X</button></div>
                <div class="window-content">Studio Murena: Jazzcore/Hip-hop da Milano. WadiruM (2023), Notturno (2025).</div>
            </div>

            <div id="win-spotify" class="window" style="top:20%; right:5%; width:300px;">
                <div class="title-bar"><span>Player</span><button onclick="closeWin('win-spotify')">X</button></div>
                <div class="window-content">
                    <iframe src="https://open.spotify.com/embed/artist/3B3mNfUv0Yf20i28mGf7S6" width="100%" height="152" frameBorder="0" allow="encrypted-media"></iframe>
                </div>
            </div>

            <div id="taskbar"><button>Start</button></div>
        </div>
    </div>
    <script>
        function openWin(id) { document.getElementById(id).style.display = 'flex'; }
        function closeWin(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
