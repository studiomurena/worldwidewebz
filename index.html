<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>STUDIO MURENA - OS 96</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: #008080; 
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            margin: 0; padding: 0;
            font-family: "Courier New", monospace;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* DVD BOUNCING LOGO */
        #dvd-logo {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            white-space: nowrap;
            color: #00ff00;
            text-shadow: 2px 2px #000;
            z-index: 0; /* Dietro le finestre */
            user-select: none;
            pointer-events: none;
        }

        #desktop {
            flex-grow: 1;
            position: relative;
            padding: 20px;
            z-index: 1; /* Sopra il logo DVD per cliccare le icone */
        }

        .icon {
            width: 80px; text-align: center; cursor: pointer; color: white;
            text-shadow: 1px 1px #000; font-size: 11px; margin-bottom: 20px;
        }
        .icon span { font-size: 30px; display: block; margin-bottom: 5px; }

        /* WINDOW SYSTEM */
        .window {
            position: absolute; background: #c0c0c0; border: 3px outset #fff;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.5); display: none;
            flex-direction: column; z-index: 10;
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0); color: white;
            padding: 4px 10px; font-weight: bold; display: flex;
            justify-content: space-between; align-items: center; cursor: move;
        }
        .window-content { padding: 15px; max-height: 450px; overflow-y: auto; color: #000; }

        /* TASKBAR & GLITCH CLOCK */
        #taskbar {
            height: 40px; background: #c0c0c0; border-top: 3px outset #fff;
            display: flex; align-items: center; padding: 2px; z-index: 9999;
        }
        .start-btn {
            background: #c0c0c0; border: 2px outset #fff;
            padding: 2px 10px; font-weight: bold; cursor: pointer;
        }
        #glitch-clock {
            margin-left: auto; padding: 0 15px;
            font-weight: bold; color: #000;
            border-left: 2px inset #fff; height: 100%;
            display: flex; align-items: center; min-width: 120px;
            background: #bdbdbd;
        }

        .glitch-anim { animation: glitch-effect 0.2s infinite; color: red; }
        @keyframes glitch-effect {
            0% { transform: translate(2px,0); }
            50% { transform: translate(-2px,0); }
            100% { transform: translate(0,0); }
        }

        button { background: #c0c0c0; border: 2px outset #fff; padding: 5px; cursor: pointer; }
        button:active { border-style: inset; }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="jazzhighlanders 8bit [2026-04-22 140712].wav" type="audio/wav">
</audio>

<div id="dvd-logo">STUDIOMURENA.NET</div>

<div id="desktop">
    <div class="icon" onclick="openWin('win-bio')"><span>👤</span>BIO_MURENA.TXT</div>
    <div class="icon" onclick="openWin('win-merch')"><span>👕</span>MERCH.EXE</div>
    <div class="icon" onclick="openWin('win-spotify')"><span>📻</span>AUDIO.WAV</div>
    <div class="icon" onclick="window.location.href='gioco.html'"><span>🎮</span>GIOCO.LNK</div>
</div>

<div id="win-bio" class="window" style="width: 400px; top: 50px; left: 50px;">
    <div class="title-bar"><span>Bio.txt</span><button onclick="closeWin('win-bio')">X</button></div>
    <div class="window-content">
        <h3>Studio Murena</h3>
        <p>Jazzcore dal futuro. 18.06.2026 @ Magnolia.</p>
    </div>
</div>

<div id="win-spotify" class="window" style="width: 400px; top: 80px; left: 450px;">
    <div class="title-bar"><span>Player</span><button onclick="closeWin('win-spotify')">X</button></div>
    <div class="window-content">
        <button onclick="document.getElementById('bg-music').play()" style="width:100%; margin-bottom:10px;">🎵 ATTIVA AUDIO 8-BIT</button>
        <hr>
        <p>Spotify Embed qui:</p>
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/artist/3BfQe4d6Y69H8M5C6X3L1q" width="100%" height="152" frameBorder="0" allow="autoplay; encrypted-media"></iframe>
    </div>
</div>

<div id="taskbar">
    <div class="start-btn">Start</div>
    <div id="glitch-clock">--/--/----</div>
</div>

<script>
    // --- DVD LOGO LOGIC ---
    const logo = document.getElementById('dvd-logo');
    let x = 0, y = 0, dx = 2, dy = 2;
    function moveLogo() {
        const winW = window.innerWidth;
        const winH = window.innerHeight - 40; // Taskbar
        if (x + logo.offsetWidth >= winW || x <= 0) {
            dx *= -1;
            logo.style.color = '#' + Math.floor(Math.random()*16777215).toString(16);
        }
        if (y + logo.offsetHeight >= winH || y <= 0) {
            dy *= -1;
            logo.style.color = '#' + Math.floor(Math.random()*16777215).toString(16);
        }
        x += dx; y += dy;
        logo.style.left = x + 'px';
        logo.style.top = y + 'px';
        requestAnimationFrame(moveLogo);
    }
    moveLogo();

    // --- GLITCH CLOCK LOGIC ---
    const clock = document.getElementById('glitch-clock');
    const dates = [
        "04/08/1992",
        () => new Date().toLocaleDateString('it-IT'),
        "18/06/2026"
    ];
    let dateIdx = 0;

    setInterval(() => {
        clock.classList.add('glitch-anim');
        setTimeout(() => {
            clock.classList.remove('glitch-anim');
            dateIdx = (dateIdx + 1) % dates.length;
            const d = dates[dateIdx];
            clock.innerText = typeof d === 'function' ? d() : d;
        }, 300);
    }, 5000);
    clock.innerText = dates[1](); // Parte con data odierna

    // --- WINDOW MGMT ---
    function openWin(id) { document.getElementById(id).style.display = 'flex'; }
    function closeWin(id) { document.getElementById(id).style.display = 'none'; }

    // Trascinamento finestre
    const windows = document.querySelectorAll('.window');
    windows.forEach(win => {
        const tb = win.querySelector('.title-bar');
        tb.onmousedown = (e) => {
            let sx = e.clientX - win.offsetLeft;
            let sy = e.clientY - win.offsetTop;
            document.onmousemove = (e) => {
                win.style.left = e.clientX - sx + 'px';
                win.style.top = e.clientY - sy + 'px';
            };
            document.onmouseup = () => document.onmousemove = null;
        };
    });
</script>

</body>
</html>
