<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>McLovin: Studio Murena Ultimate Arcade</title>
    <style>
        body { 
            background: #008080; margin: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; height: 100vh; overflow: hidden; 
            font-family: 'MS Sans Serif', Tahoma, Geneva, sans-serif; 
        }
        #header-bar {
            width: 100%; max-width: 800px; background: #c0c0c0; border-top: 2px solid #fff; 
            border-left: 2px solid #fff; border-bottom: 2px solid #000; border-right: 2px solid #000;
            padding: 8px; display: flex; justify-content: flex-start; margin-bottom: 10px; box-sizing: border-box;
        }
        #back-btn {
            background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff;
            border-bottom: 2px solid #808080; border-right: 2px solid #808080;
            padding: 4px 10px; text-decoration: none; color: #000; font-weight: bold; font-size: 12px;
        }
        #canvas-container { 
            position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; 
            border-radius: 20px; background: #111; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 50px rgba(0,255,255,0.15); 
        }
        canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #canvas-container::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 2;
        }
        #controls {
            margin-top: 15px; display: flex; justify-content: space-between;
            width: 100%; max-width: 800px; padding: 0 10px; box-sizing: border-box;
        }
        .btn-group { display: flex; gap: 10px; }
        button {
            background: #c0c0c0; border-top: 3px solid #fff; border-left: 3px solid #fff;
            border-bottom: 3px solid #808080; border-right: 3px solid #808080;
            padding: 15px 25px; font-weight: bold; cursor: pointer; touch-action: manipulation;
        }
        .btn-red { background: #c23616; color: #fff; border-color: #ff7979 #600000 #600000 #ff7979; }
    </style>
</head>
<body>

<div id="header-bar">
    <a href="index.html" id="back-btn">← DESKTOP</a>
</div>

<div id="canvas-container">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
</div>

<div id="controls">
    <div class="btn-group">
        <button onmousedown="press('ArrowUp')" ontouchstart="press('ArrowUp')">▲ SALTA</button>
        <button onmousedown="press('ArrowDown')" ontouchstart="press('ArrowDown')">▼ OK / RESTART</button>
    </div>
    <div class="btn-group">
        <button class="btn-red" onmousedown="press('ArrowRight')" ontouchstart="press('ArrowRight')">👊 PUGNO</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

// 1. DEFINIZIONE PATH E ASSET
const PATH = "assets/"; // Assicurati che la cartella si chiami esattamente assets

const img = {};
const assetNames = [
    "room.png", "parking.png", "stage.png",
    "mclovin_idle.png", "mclovin_walk.png", "mclovin_attack.png", "mclovin_hurt.png",
    "nacho_idle.png", "nacho_walk.png", "nacho_attack.png", "nacho_hurt.png",
    "baba_idle.png", "baba_walk.png", "baba_attack.png", "baba_hurt.png",
    "murena_idle.png", "murena_walk.png", "murena_attack.png", "murena_hurt.png"
];

// Caricamento automatico
assetNames.forEach(name => {
    const key = name.split('.')[0];
    img[key] = new Image();
    img[key].src = PATH + name;
    img[key].onerror = () => console.error("Errore caricamento:", PATH + name);
});

// Configurazione Frame (basata su 128x128 pixel per frame)
const CONF = {
    mclovin: { w: 128, h: 128, frames: { idle: 4, walk: 6, attack: 4, hurt: 3 }, speed: 8 },
    nacho: { w: 128, h: 128, frames: { idle: 4, walk: 6, attack: 4, hurt: 3 }, speed: 10 },
    baba: { w: 128, h: 128, frames: { idle: 4, walk: 6, attack: 4, hurt: 3 }, speed: 10 },
    murena: { w: 128, h: 128, frames: { idle: 4, walk: 6, attack: 4, hurt: 3 }, speed: 10 }
};

function drawSprite(type, action, x, y, timer, flip = false) {
    const key = `${type}_${action}`;
    const image = img[key];
    const c = CONF[type];
    
    if (!image || !image.complete || image.naturalWidth === 0) {
        ctx.fillStyle = "magenta"; ctx.fillRect(x, y, 80, 80); // Placeholder se non trova l'immagine
        return;
    }

    const frameCount = c.frames[action] || 4;
    const col = Math.floor(timer / c.speed) % frameCount;

    ctx.save();
    ctx.translate(x, y);
    if (flip) { ctx.scale(-1, 1); ctx.translate(-c.w, 0); }
    ctx.drawImage(image, col * c.w, 0, c.w, c.h, 0, 0, c.w, c.h);
    ctx.restore();
}

// 2. LOGICA GIOCO
let state = "INTRO", frame = 0, level = 1, kills = 0, hp = 10, cameraShake = 0;
const player = { x: 80, y: 250, vy: 0, gravity: 0.7, jump: -15, grounded: true, punching: 0, invul: 0, action: "idle" };
let enemies = [], particles = [], bullets = [];

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;
function press(c) { keys[c] = true; setTimeout(() => keys[c] = false, 100); }

function update() {
    frame++;
    if (state === "INTRO" && (keys["ArrowRight"] || keys["ArrowUp"])) state = "PLAY";
    if (state === "STORY_BREAK" && keys["ArrowDown"]) state = "PLAY";
    if (state === "GAMEOVER" && keys["ArrowDown"]) { hp=10; kills=0; level=1; enemies=[]; bullets=[]; state="PLAY"; }

    if (state === "PLAY") {
        if (keys["ArrowUp"] && player.grounded) { player.vy = player.jump; player.grounded = false; }
        player.vy += player.gravity; player.y += player.vy;
        if (player.y > 250) { player.y = 250; player.vy = 0; player.grounded = true; }

        // Gestione Azione Player
        player.action = "idle";
        if (keys["ArrowRight"] && player.punching === 0) { player.punching = 15; cameraShake = 5; }
        if (!player.grounded) player.action = "walk";
        if (player.punching > 0) { player.action = "attack"; player.punching--; }
        if (player.invul > 0) { player.action = "hurt"; player.invul--; }

        // Spawn Nemici per Livello
        if (frame % 90 === 0) {
            let type = level === 1 ? "nacho" : (level === 2 ? "baba" : "murena");
            enemies.push({ x: 850, y: type === "baba" ? 220 : 250, type: type, timer: 0 });
            if (type === "murena") bullets.push({ x: 850, y: 310, vx: -8 });
        }

        enemies.forEach((e, i) => {
            e.timer++; e.x -= (3 + level);
            let pX = player.x + 64, eX = e.x + 64;
            // Collisione Pugno
            if (player.punching > 0 && Math.abs(pX - eX) < 80 && Math.abs(player.y - e.y) < 80) {
                enemies.splice(i, 1); kills++;
                if (kills === 10) { level=2; state="STORY_BREAK"; }
                if (kills === 25) { level=3; state="STORY_BREAK"; }
                if (kills >= 45) state = "WIN";
            } 
            // Collisione Danno
            else if (Math.abs(pX - eX) < 40 && player.invul === 0) {
                hp--; player.invul = 40; cameraShake = 10; if(hp<=0) state="GAMEOVER";
            }
        });

        bullets.forEach((b, i) => {
            b.x += b.vx;
            if (Math.abs(player.x + 64 - b.x) < 30 && Math.abs(player.y + 64 - b.y) < 40 && player.invul === 0) {
                hp--; player.invul = 40; bullets.splice(i, 1);
            }
        });
    }
}

function draw() {
    ctx.save();
    if (cameraShake > 0) { ctx.translate((Math.random()-0.5)*cameraShake, (Math.random()-0.5)*cameraShake); cameraShake *= 0.8; }
    
    // Sfondo Livello
    let bg = img[level === 1 ? "room" : (level === 2 ? "parking" : "stage")];
    if (bg && bg.complete) ctx.drawImage(bg, 0, 0, 800, 450);
    else { ctx.fillStyle = "#222"; ctx.fillRect(0,0,800,450); }

    if (state === "PLAY") {
        drawSprite("mclovin", player.action, player.x, player.y, frame, false);
        enemies.forEach(e => drawSprite(e.type, "walk", e.x, e.y, e.timer, true));
        bullets.forEach(b => { ctx.fillStyle="#0f0"; ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, 7); ctx.fill(); });
        
        // HUD
        ctx.fillStyle = "#f00"; ctx.fillRect(20, 20, hp * 20, 15);
        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Courier"; ctx.fillText("KILLS: " + kills, 700, 35);
    } else if (state === "STORY_BREAK") {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,450);
        ctx.textAlign = "center"; ctx.fillStyle = "#fff";
        ctx.font = "30px Arial"; ctx.fillText(level === 2 ? "PARKING LOT: ATTACCO DELLE BABA!" : "STAGE: LA MURENA FINALE!", 400, 200);
        ctx.font = "15px Arial"; ctx.fillText("PREMI GIÙ PER CONTINUARE", 400, 250);
    } else if (state === "INTRO") {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,450);
        ctx.textAlign = "center"; ctx.fillStyle = "#fff";
        ctx.font = "30px Arial"; ctx.fillText("MCLOVIN ARCADE EDITION", 400, 200);
        ctx.fillText("PREMI PUGNO PER INIZIARE", 400, 280);
    } else if (state === "GAMEOVER") {
        ctx.fillStyle = "red"; ctx.font = "50px Arial"; ctx.fillText("WASTED", 400, 225);
    } else if (state === "WIN") {
        ctx.fillStyle = "gold"; ctx.font = "40px Arial"; ctx.fillText("MISSIONE COMPIUTA!", 400, 225);
    }
    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
