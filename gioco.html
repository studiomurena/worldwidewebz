<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MCLOVIN GUEST SWEEPER - STUDIO MURENA</title>
    <style>
        /* ESTETICA ORIGINALE RICHIESTA */
        * { box-sizing: border-box; } /* Fondamentale per non far strabordare nulla */
        
        body { 
            background: #000 url('https://www.transparenttextures.com/patterns/stardust.png');
            color: #00ff00; 
            font-family: "Courier New", monospace; 
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        #os-window {
            width: 800px; background: #c0c0c0; border: 3px outset #fff;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.8); position: relative;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0); color: white;
            padding: 4px 10px; font-weight: bold; display: flex; justify-content: space-between;
            align-items: center;
        }

        /* TASTO AUDIO STILE WIN95 */
        #audio-toggle {
            background: #c0c0c0; color: #000; border: 2px outset #fff;
            font-size: 10px; padding: 2px 6px; cursor: pointer; font-family: sans-serif;
            font-weight: bold;
        }
        #audio-toggle:active { border-style: inset; }

        /* AREA ANIMAZIONE E CREW */
        #animation-zone {
            height: 140px; background: #222; margin: 10px; border: 3px inset #808080;
            position: relative; overflow-x: auto; display: flex; align-items: flex-end; 
            justify-content: flex-start; padding: 10px; gap: 8px;
            background-image: linear-gradient(#444 1px, transparent 1px), linear-gradient(90deg, #444 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #mclovin {
            width: 55px; height: 55px; background: #f0d0b0; border: 3px solid #000;
            position: relative; display: flex; flex-direction: column; align-items: center;
            box-shadow: 3px 3px 0px #444; flex-shrink: 0; margin-right: 10px;
        }
        #mclovin::before { content: "🕶️"; font-size: 18px; margin-top: 2px; } 
        #mclovin::after { content: "👕"; font-size: 28px; position: absolute; bottom: -5px; }

        .guest-member {
            width: 45px; height: 45px; background: #fff; border: 2px solid #000;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 2px 2px 0px #000; flex-shrink: 0;
        }
        @keyframes pop-in { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0); } }

        .pokemon-jump { animation: poke-jump 0.5s ease-out; }
        @keyframes poke-jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* GRIGLIA PRATO FIORITO RIDIMENSIONATA */
        #grid-container {
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            gap: 2px;
            padding: 5px; background: #808080; margin: 10px; border: 3px inset #fff;
            max-width: calc(100% - 20px);
        }

        .cell {
            aspect-ratio: 1/1; background: #c0c0c0;
            border: 2px outset #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px; user-select: none; color: #000;
        }

        .cell.revealed { border: 1px solid #999; background: #bdbdbd; cursor: default; }
        .cell.found { background: #ffff00 !important; border: 1px solid #000; font-size: 14px; }
        
        .n1 { color: blue; } .n2 { color: green; } .n3 { color: red; } .n4 { color: darkblue; }

        /* STATUS BOX */
        #status-bar {
            background: #000; color: #00ff00; margin: 10px; padding: 8px;
            border: 2px inset #fff; font-size: 12px; height: 35px; overflow: hidden;
        }

        .flash-white { filter: brightness(1.5); }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="jazzhighlanders 8bit [2026-04-22 140712].wav" type="audio/wav">
</audio>

<div id="os-window">
    <div class="title-bar">
        <span>Guest_Sweeper_v4.exe - <span id="rem">10</span> DA TROVARE</span>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button id="audio-toggle" onclick="toggleMusic()">🎵 PLAY</button>
            <span>[?][X]</span>
        </div>
    </div>

    <div id="animation-zone">
        <div id="mclovin"></div>
    </div>

    <div id="status-bar">
        <p id="msg" style="margin:0;"><b>MCLOVIN:</b> "Trova nel campo i guest del 18 giugno!"</p>
    </div>

    <div id="grid-container"></div>
</div>

<script>
    // GESTIONE MUSICA
    const music = document.getElementById('bg-music');
    const audioBtn = document.getElementById('audio-toggle');
    
    function toggleMusic() {
        if (music.paused) {
            music.play();
            audioBtn.innerText = "🎵 STOP";
            audioBtn.style.borderStyle = "inset";
        } else {
            music.pause();
            audioBtn.innerText = "🎵 PLAY";
            audioBtn.style.borderStyle = "outset";
        }
    }

    const guestList = [
        { n: "Arya", i: "🌬️" }, { n: "Carlo Corallo", i: "🪸" },
        { n: "Daykoda", i: "🎛️" }, { n: "Jack the smoker", i: "🚬" },
        { n: "Mezzosangue", i: "🩸" }, { n: "Silent Bob", i: "🛷" },
        { n: "Willie Peyote", i: "🐂" }, { n: "Il Danno", i: "🔦" },
        { n: "Ghemon", i: "🗡️" }, { n: "Egreen", i: "🟩" }
    ];

    const rows = 10, cols = 15, totalGuests = 10;
    let found = 0;
    const gridDiv = document.getElementById('grid-container');
    const mclovin = document.getElementById('mclovin');
    const animZone = document.getElementById('animation-zone');
    const msg = document.getElementById('msg');
    const remDisplay = document.getElementById('rem');

    let matrix = [];

    function init() {
        for(let r=0; r<rows; r++) {
            matrix[r] = [];
            for(let c=0; c<cols; c++) matrix[r][c] = { isGuest: false, revealed: false, neighbors: 0, icon: "", name: "" };
        }

        let placed = 0;
        while(placed < totalGuests) {
            let rr = Math.floor(Math.random()*rows), cc = Math.floor(Math.random()*cols);
            if(!matrix[rr][cc].isGuest) {
                matrix[rr][cc].isGuest = true;
                matrix[rr][cc].icon = guestList[placed].i;
                matrix[rr][cc].name = guestList[placed].n;
                placed++;
            }
        }

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                if(!matrix[r][c].isGuest) {
                    let count = 0;
                    for(let i=-1; i<=1; i++) {
                        for(let j=-1; j<=1; j++) {
                            if(matrix[r+i] && matrix[r+i][c+j] && matrix[r+i][c+j].isGuest) count++;
                        }
                    }
                    matrix[r][c].neighbors = count;
                }
            }
        }

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `c-${r}-${c}`;
                cell.onclick = () => reveal(r, c);
                gridDiv.appendChild(cell);
            }
        }
    }

    function reveal(r, c) {
        if(!matrix[r] || !matrix[r][c] || matrix[r][c].revealed) return;
        
        let cellData = matrix[r][c];
        const cellDiv = document.getElementById(`c-${r}-${c}`);
        cellData.revealed = true;
        cellDiv.classList.add('revealed');

        if(cellData.isGuest) {
            cellDiv.innerHTML = cellData.icon;
            cellDiv.classList.add('found');
            found++;
            remDisplay.innerText = totalGuests - found;
            
            mclovin.classList.add('pokemon-jump');
            setTimeout(() => mclovin.classList.remove('pokemon-jump'), 500);

            const member = document.createElement('div');
            member.className = 'guest-member';
            member.innerHTML = cellData.icon;
            member.title = cellData.name;
            animZone.appendChild(member);
            
            msg.innerHTML = `<b>TROVATO!</b> ${cellData.name.toUpperCase()} si è unito!`;

            if(found === totalGuests) setTimeout(win, 1000);
        } else {
            if(cellData.neighbors > 0) {
                cellDiv.innerHTML = cellData.neighbors;
                cellDiv.classList.add('n' + cellData.neighbors);
            } else {
                for(let i=-1; i<=1; i++) {
                    for(let j=-1; j<=1; j++) {
                        if(i !== 0 || j !== 0) reveal(r+i, c+j);
                    }
                }
            }
        }
    }

    function win() {
        document.body.style.background = "linear-gradient(45deg, #ff00ff, #00ffff)";
        document.getElementById('os-window').innerHTML = `
            <div class="title-bar" style="background: #000;"><span>!!! FULL CREW UNLOCKED !!!</span></div>
            <div style="padding:25px; text-align:center; color:#000; font-family: sans-serif;">
                <h1 class="blink" style="font-size:32px; margin:0;">MISSIONE COMPIUTA!</h1>
                <div style="background:#000; color:#fff; padding:15px; border:4px solid #fff; margin:15px 0; box-shadow: 8px 8px 0px #ff00ff;">
                    <h2 style="margin:0; font-size:18px; color:#00ffff;">18 GIUGNO 2026</h2>
                    <h1 style="font-size:32px; color:#00ff00; margin:5px 0;">STUDIOMURENA.NET</h1>
                    <h2 style="margin:0;">MAGNOLIA - MILANO</h2>
                </div>
                <p style="font-size:11px; font-weight:bold;">LA SQUADRA È PRONTA. CI VEDIAMO AL LIVE.</p>
                <div style="font-size:25px; margin-top:10px;">🕶️🌬️🪸🎛️🚬🩸🛷🐂🔦🗡️🟩</div>
            </div>
        `;
    }

    init();
</script>

</body>
</html>
